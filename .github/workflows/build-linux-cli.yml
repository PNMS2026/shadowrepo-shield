name: Build Linux CLI Release Asset

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-cli:
    name: Build Linux CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Show build commit
        run: |
          git rev-parse HEAD
          git log --oneline -1

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustc --version
          cargo --version

      - name: Build Linux CLI
        run: |
          cargo build --manifest-path src-tauri/Cargo.toml --bin shadowrepo-cli --release

      - name: Prepare Linux release assets
        run: |
          mkdir -p release-assets
          cp src-tauri/target/release/shadowrepo-cli release-assets/shadowrepo-cli-linux-x86_64
          chmod +x release-assets/shadowrepo-cli-linux-x86_64
          cd release-assets
          sha256sum shadowrepo-cli-linux-x86_64 > shadowrepo-cli-linux-x86_64.sha256
          ls -lh
          cat shadowrepo-cli-linux-x86_64.sha256

      - name: Upload Linux CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: shadowrepo-cli-linux-v1.4.0
          path: |
            release-assets/shadowrepo-cli-linux-x86_64
            release-assets/shadowrepo-cli-linux-x86_64.sha256
          if-no-files-found: error
