# ShadowRepo Shield — Verified Scan GitHub Action
#
# This workflow runs the OFFICIAL ShadowRepo Shield scanner binary
# from the official release. It does NOT run scanner code from the
# user's repository, because the user could modify that code and
# fake the score.
#
# Trust model:
# - The scanner binary is downloaded from the official GitHub release
# - The scan runs in ScanMode::Verified
# - The scanner_signature is populated from GitHub Actions environment
# - The report JSON is uploaded as a workflow artifact
#
# Security:
# - No source code is uploaded to any external server
# - AI features are disabled in CI mode
# - Score is computed deterministically by the regex engine
# - This workflow does NOT submit blockchain proofs (deferred feature)

name: ShadowRepo Shield Scan

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      scan_path:
        description: 'Path to scan (relative to repo root)'
        required: false
        default: '.'
      scan_name:
        description: 'Name for the scan'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download ShadowRepo Shield CLI
        run: |
          # To pin to a specific release version (recommended for production security),
          # you can define: SHADOWREPO_VERSION="v1.4.0"
          # Default is "latest".
          SHADOWREPO_VERSION="latest"
          
          echo "Target Version: $SHADOWREPO_VERSION"
          if [ "$SHADOWREPO_VERSION" = "latest" ]; then
            RELEASE_URL="https://github.com/${{ github.repository_owner }}/shadowrepo-shield/releases/latest/download/shadowrepo-cli-linux-x86_64"
            CHECKSUM_URL="https://github.com/${{ github.repository_owner }}/shadowrepo-shield/releases/latest/download/shadowrepo-cli-linux-x86_64.sha256"
          else
            RELEASE_URL="https://github.com/${{ github.repository_owner }}/shadowrepo-shield/releases/download/${SHADOWREPO_VERSION}/shadowrepo-cli-linux-x86_64"
            CHECKSUM_URL="https://github.com/${{ github.repository_owner }}/shadowrepo-shield/releases/download/${SHADOWREPO_VERSION}/shadowrepo-cli-linux-x86_64.sha256"
          fi
          
          echo "Downloading ShadowRepo Shield CLI from official release..."
          curl -fsSL "$RELEASE_URL" -o shadowrepo-cli || {
            echo "::warning::Official release binary not found. Skipping scan."
            echo "SCAN_SKIPPED=true" >> $GITHUB_ENV
            exit 0
          }
          
          # Verify checksum if checksum file exists
          echo "Checking for checksum file..."
          if curl -fsSL "$CHECKSUM_URL" -o shadowrepo-cli.sha256 2>/dev/null; then
            echo "Verifying binary integrity with SHA256 checksum..."
            EXPECTED=$(cat shadowrepo-cli.sha256 | awk '{print $1}')
            ACTUAL=$(sha256sum shadowrepo-cli | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::Checksum verification FAILED. Expected: $EXPECTED, Got: $ACTUAL"
              echo "The downloaded binary may have been tampered with. Aborting."
              exit 1
            fi
            echo "Checksum verification passed: $ACTUAL"
          else
            echo "::warning::No checksum file found at release. Skipping integrity verification."
            echo "To enable checksum verification, upload a .sha256 file alongside the release binary."
          fi
          
          chmod +x shadowrepo-cli
          echo "ShadowRepo Shield CLI ready"

      - name: Run verified scan
        if: env.SCAN_SKIPPED != 'true'
        id: scan
        run: |
          SCAN_PATH="${{ github.event.inputs.scan_path || '.' }}"
          SCAN_NAME="${{ github.event.inputs.scan_name || github.repository }}"
          
          echo "Running ShadowRepo Shield scan..."
          echo "  Path: $SCAN_PATH"
          echo "  Name: $SCAN_NAME"
          echo "  Mode: verified"
          echo ""
          
          # Run the scan in verified mode
          # Exit codes: 0=low, 1=review, 2=high, 3=critical
          set +e
          ./shadowrepo-cli "$SCAN_PATH" \
            --name "$SCAN_NAME" \
            --mode verified \
            --output report.json
          EXIT_CODE=$?
          set -e
          
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          
          # Parse risk score from report
          if [ -f report.json ]; then
            RISK_SCORE=$(cat report.json | python3 -c "import sys, json; print(json.load(sys.stdin)['risk_score'])" 2>/dev/null || echo "unknown")
            RISK_LEVEL=$(cat report.json | python3 -c "import sys, json; print(json.load(sys.stdin)['risk_level'])" 2>/dev/null || echo "unknown")
            TOTAL_FINDINGS=$(cat report.json | python3 -c "import sys, json; print(json.load(sys.stdin)['total_findings'])" 2>/dev/null || echo "unknown")
            TOTAL_FILES=$(cat report.json | python3 -c "import sys, json; print(json.load(sys.stdin)['total_files'])" 2>/dev/null || echo "unknown")
            REPORT_HASH=$(cat report.json | python3 -c "import sys, json; print(json.load(sys.stdin)['report_hash'])" 2>/dev/null || echo "unknown")
            
            echo "risk_score=$RISK_SCORE" >> $GITHUB_OUTPUT
            echo "risk_level=$RISK_LEVEL" >> $GITHUB_OUTPUT
            echo "total_findings=$TOTAL_FINDINGS" >> $GITHUB_OUTPUT
            echo "total_files=$TOTAL_FILES" >> $GITHUB_OUTPUT
            echo "report_hash=$REPORT_HASH" >> $GITHUB_OUTPUT
          fi
          
          # Map exit code to status
          case $EXIT_CODE in
            0) echo "status=✅ Low Risk" >> $GITHUB_OUTPUT ;;
            1) echo "status=⚠️ Review Recommended" >> $GITHUB_OUTPUT ;;
            2) echo "status=🔶 High Risk" >> $GITHUB_OUTPUT ;;
            3) echo "status=🚨 Critical Threat Indicators Found" >> $GITHUB_OUTPUT ;;
            *) echo "status=❌ Scan Error" >> $GITHUB_OUTPUT ;;
          esac

      - name: Upload scan report
        if: env.SCAN_SKIPPED != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: shadowrepo-shield-report
          path: report.json
          retention-days: 90

      - name: Comment on PR
        if: github.event_name == 'pull_request' && env.SCAN_SKIPPED != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.scan.outputs.status }}';
            const score = '${{ steps.scan.outputs.risk_score }}';
            const level = '${{ steps.scan.outputs.risk_level }}';
            const findings = '${{ steps.scan.outputs.total_findings }}';
            const files = '${{ steps.scan.outputs.total_files }}';
            const reportHash = '${{ steps.scan.outputs.report_hash }}';
            const exitCode = '${{ steps.scan.outputs.exit_code }}';
            
            const body = `## 🛡️ ShadowRepo Shield — Verified Scan Result

            | Metric | Value |
            |--------|-------|
            | **Status** | ${status} |
            | **Risk Score** | ${score}/100 |
            | **Risk Level** | ${level} |
            | **Files Scanned** | ${files} |
            | **Findings** | ${findings} |
            | **Report Hash** | \`${reportHash}\` |
            | **Scan Mode** | ✅ CI Verified Foundation |

            > **Note:** This scan was performed by the official ShadowRepo Shield binary.
            > The report hash can be used for integrity verification.
            > This is a CI verified foundation — not cryptographically signed or formally attested.

            📎 Full report available in workflow artifacts.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Set check status
        if: env.SCAN_SKIPPED != 'true'
        run: |
          EXIT_CODE=${{ steps.scan.outputs.exit_code }}
          if [ "$EXIT_CODE" = "3" ]; then
            echo "::error::ShadowRepo Shield detected critical threat indicators (score: ${{ steps.scan.outputs.risk_score }}/100)"
            exit 1
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "::warning::ShadowRepo Shield detected high risk (score: ${{ steps.scan.outputs.risk_score }}/100)"
          fi
